<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Git Portal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#1f2937,#111827);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    width:400px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    padding:35px;
    border-radius:20px;
    box-shadow:0 15px 30px rgba(0,0,0,.3);
    animation:slideUp 1s ease;
}

.page{
    display:none;
}

.page.active{
    display:block;
}

h1{
    color:white;
    text-align:center;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:15px;
    margin:10px 0;
    border:none;
    border-radius:12px;
    outline:none;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:.4s;
}

button:hover{
    background:#1d4ed8;
    transform:translateY(-3px);
}

p{
    text-align:center;
    margin-top:18px;
    color:white;
}

a{
    color:#60a5fa;
    cursor:pointer;
    text-decoration:none;
}

.home-btn{
    margin-top:15px;
    background:#10b981;
}

.home{
    text-align:center;
}

.home h1{
    font-size:50px;
}

.home p{
    margin:20px 0;
    line-height:1.6;
}

.option-btn{
    margin:10px 0;
}

@keyframes slideUp{
    from{
        opacity:0;
        transform:translateY(60px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>
<body>

<div class="container">

    <!-- Home Page -->
    <div class="page active" id="home">
        <div class="home">
            <h1>Git Portal</h1>
            <p>
                Modern Login & Registration UI<br>
                with smooth animations.
            </p>

            <button class="option-btn" onclick="showPage('login')">
                Login
            </button>

            <button class="option-btn home-btn" onclick="showPage('register')">
                Register
            </button>
        </div>
    </div>

    <!-- Login Page -->
    <div class="page" id="login">
        <h1>Login</h1>

        <input type="email" placeholder="Email">

        <input type="password" placeholder="Password">

        <button>Login</button>

        <p>
            Don't have an account?
            <a onclick="showPage('register')">Register</a>
        </p>

        <p>
            <a onclick="showPage('home')">← Home</a>
        </p>
    </div>

    <!-- Register Page -->
    <div class="page" id="register">
        <h1>Create Account</h1>

        <input type="text" placeholder="Full Name">

        <input type="email" placeholder="Email">

        <input type="password" placeholder="Password">

        <button>Create Account</button>

        <p>
            Already have an account?
            <a onclick="showPage('login')">Login</a>
        </p>

        <p>
            <a onclick="showPage('home')">← Home</a>
        </p>
    </div>

</div>

<script>
function showPage(pageId){
    document.querySelectorAll('.page').forEach(page=>{
        page.classList.remove('active');
    });

    document.getElementById(pageId).classList.add('active');
}
</script>

</body>
</html>

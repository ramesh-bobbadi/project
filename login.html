<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.login-box{
    width:350px;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 15px rgba(0,0,0,0.2);
}

.login-box h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.input-box{
    margin-bottom:15px;
}

.input-box input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:5px;
    outline:none;
    font-size:16px;
}

.input-box input:focus{
    border-color:#4facfe;
}

button{
    width:100%;
    padding:12px;
    background:#4facfe;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0077ff;
}

.extra{
    text-align:center;
    margin-top:15px;
}

.extra a{
    text-decoration:none;
    color:#4facfe;
}

.extra a:hover{
    text-decoration:underline;
}
</style>

</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <form action="#" method="post">
        <div class="input-box">
            <input type="text" placeholder="Username" required>
        </div>

        <div class="input-box">
            <input type="password" placeholder="Password" required>
        </div>

        <button type="submit">Login</button>

        <div class="extra">
            <p>Don't have an account? <a href="#">Register</a></p>
            <p><a href="#">Forgot Password?</a></p>
        </div>
    </form>
</div>

</body>
</html>
